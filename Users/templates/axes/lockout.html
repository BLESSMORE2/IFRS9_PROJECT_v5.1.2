<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account Locked</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* Reset and basic styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    /* Card container */
    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 90%;
      padding: 2rem;
      text-align: center;
      animation: fadeIn 1s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Heading styling */
    h1 {
      font-size: 2.5rem;
      color: #e63946;
      margin-bottom: 1rem;
    }
    /* Paragraph styling */
    p {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #555;
      margin-bottom: 2rem;
    }
    /* Button styling */
    .btn {
      background: #1d3557;
      color: #ffffff;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #457b9d;
    }
    /* Footer note */
    .footer {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Account Locked</h1>
    <p>
      Your account has been temporarily locked due to multiple unsuccessful login attempts.
      For your security, please try again in 1 hour.
    </p>
    <a href="{% url 'login' %}" class="btn">Return Home</a>
    <div class="footer">
      If you need immediate assistance, please contact support.
    </div>
  </div>
</body>
</html>
