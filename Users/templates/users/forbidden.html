<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title|default:"Access denied" }} ? NEXA</title>
    {% include "users/includes/style_boot_gate.html" %}
    <style>
        :root {
            --nx-blue: #0f5cc0;
            --nx-text: #17324d;
            --nx-muted: #5b7188;
            --nx-panel: #ffffff;
            --nx-bg: linear-gradient(180deg, #eef5fb 0%, #e7f0f8 100%);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: var(--nx-bg);
            color: var(--nx-text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .panel {
            width: min(100%, 620px);
            background: var(--nx-panel);
            border: 1px solid rgba(15, 92, 192, 0.12);
            border-radius: 24px;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
            padding: 28px;
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(15, 92, 192, 0.08);
            color: var(--nx-blue);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        h1 {
            margin: 18px 0 10px;
            font-size: 2rem;
            line-height: 1.1;
        }
        p {
            margin: 0;
            color: var(--nx-muted);
            line-height: 1.7;
            font-size: 1rem;
        }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 168px;
            padding: 12px 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
        }
        .btn-primary {
            background: var(--nx-blue);
            color: #fff;
        }
        .btn-secondary {
            background: #f3f7fb;
            color: var(--nx-text);
            border: 1px solid rgba(15, 92, 192, 0.12);
        }
    </style>
</head>
<body>
    <section class="panel">
        <div class="eyebrow">Access Control</div>
        <h1>{{ page_title|default:"Access denied" }}</h1>
        <p>{{ forbidden_message }}</p>
        <div class="actions">
            {% if request.user.is_authenticated %}
            <a class="btn btn-primary" href="{% url 'modules_home' %}">Back to workspace home</a>
            {% else %}
            <a class="btn btn-primary" href="{% url 'login' %}">Go to login</a>
            {% endif %}
            <a class="btn btn-secondary" href="javascript:history.back()">Go back</a>
        </div>
    </section>
</body>
</html>
